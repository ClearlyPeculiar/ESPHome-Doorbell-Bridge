# Enable logging via Serial and Web.
logger:
  baud_rate: 0

# Web server for local control and detailed telemetry (Port 80).
web_server:
  port: 80

# Global variables for state that should persist across reboots.
globals:
  - id: silent_mode_enabled
    type: bool
    restore_value: yes
    initial_value: "false"
  - id: ring_duration_ms
    type: int
    restore_value: yes
    initial_value: "200"
  - id: post_ring_delay_ms
    type: int
    restore_value: yes
    initial_value: "500"

binary_sensor:
  # Physical Doorbell Button.
  - platform: gpio
    pin:
      number: ${button_pin}
      mode: INPUT_PULLUP
      inverted: true
    name: "Doorbell Button"
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_press:
      then:
        - if:
            condition:
              lambda: |-
                return !id(silent_mode_enabled);
            then:
              - script.execute: ring_chime
            else:
              - logger.log: "Doorbell pressed, but Chime is in SILENT MODE."

script:
  # Script to handle the chime ring sequence and lockout.
  - id: ring_chime
    mode: single # Prevents overlapping executions (lockout)
    then:
      - switch.turn_on: chime_relay_physical
      - delay: !lambda "return id(ring_duration_ms);"
      - switch.turn_off: chime_relay_physical
      - delay: !lambda "return id(post_ring_delay_ms);"

select:
  - platform: template
    name: "Chime Ring Duration"
    entity_category: config
    icon: "mdi:timer-sand"
    options:
      - "50ms"
      - "100ms"
      - "200ms"
      - "300ms"
      - "500ms"
    lambda: |-
      if (id(ring_duration_ms) <= 50) return {"50ms"};
      if (id(ring_duration_ms) <= 100) return {"100ms"};
      if (id(ring_duration_ms) <= 200) return {"200ms"};
      if (id(ring_duration_ms) <= 300) return {"300ms"};
      return {"500ms"};
    set_action:
      - globals.set:
          id: ring_duration_ms
          value: !lambda |-
            if (x == "50ms") return 50;
            if (x == "100ms") return 100;
            if (x == "200ms") return 200;
            if (x == "300ms") return 300;
            return 500;

  - platform: template
    name: "Post-Chime Delay"
    entity_category: config
    icon: "mdi:timer-off-outline"
    options:
      - "0ms"
      - "200ms"
      - "500ms"
      - "1000ms"
    lambda: |-
      if (id(post_ring_delay_ms) <= 0) return {"0ms"};
      if (id(post_ring_delay_ms) <= 200) return {"200ms"};
      if (id(post_ring_delay_ms) <= 500) return {"500ms"};
      return {"1000ms"};
    set_action:
      - globals.set:
          id: post_ring_delay_ms
          value: !lambda |-
            if (x == "0ms") return 0;
            if (x == "200ms") return 200;
            if (x == "500ms") return 500;
            return 1000;

switch:
  - platform: gpio
    pin:
      number: ${relay_pin}
      inverted: true
    id: chime_relay_physical
    internal: true
    restore_mode: ALWAYS_OFF

  - platform: template
    name: "Chime Relay"
    icon: "mdi:bell-ring"
    lambda: "return id(ring_chime).is_running();"
    turn_on_action:
      - script.execute: ring_chime
    turn_off_action:
      - script.stop: ring_chime
      - switch.turn_off: chime_relay_physical

  - platform: template
    name: "Silent Mode"
    icon: "mdi:bell-off"
    lambda: |-
      return id(silent_mode_enabled);
    turn_on_action:
      - globals.set:
          id: silent_mode_enabled
          value: "true"
    turn_off_action:
      - globals.set:
          id: silent_mode_enabled
          value: "false"
