# Enable logging via Serial and Web.
logger:
  baud_rate: 0

# Web server for local control and detailed telemetry (Port 80).
web_server:
  port: 80

# Global variables for state that should persist across reboots.
globals:
  - id: silent_mode_enabled
    type: bool
    restore_value: yes
    initial_value: "false"
  - id: ring_duration_ms
    type: int
    restore_value: yes
    initial_value: "200"
  - id: post_ring_delay_ms
    type: int
    restore_value: yes
    initial_value: "500"

binary_sensor:
  # Physical Doorbell Button.
  - platform: gpio
    pin:
      number: ${button_pin}
      mode: INPUT_PULLUP
      inverted: true
    name: "Doorbell Button"
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_press:
      then:
        - if:
            condition:
              lambda: |-
                return !id(silent_mode_enabled);
            then:
              - script.execute: ring_chime
            else:
              - logger.log: "Doorbell pressed, but Chime is in SILENT MODE."

script:
  # Script to handle the chime ring sequence and lockout.
  - id: ring_chime
    mode: exclusive # Prevents overlapping executions (lockout)
    then:
      - switch.turn_on: chime_relay_physical
      - delay: !lambda "return id(ring_duration_ms);"
      - switch.turn_off: chime_relay_physical
      - delay: !lambda "return id(post_ring_delay_ms);"

number:
  - platform: template
    name: "Chime Ring Duration"
    entity_category: config
    unit_of_measurement: "ms"
    min_value: 50
    max_value: 500
    step: 50
    icon: "mdi:timer-sand"
    lambda: |-
      return id(ring_duration_ms);
    set_action:
      - globals.set:
          id: ring_duration_ms
          value: !lambda "return x;"

  - platform: template
    name: "Post-Chime Delay"
    entity_category: config
    unit_of_measurement: "ms"
    min_value: 0
    max_value: 1000
    step: 100
    icon: "mdi:timer-off-outline"
    lambda: |-
      return id(post_ring_delay_ms);
    set_action:
      - globals.set:
          id: post_ring_delay_ms
          value: !lambda "return x;"

switch:
  - platform: gpio
    pin:
      number: ${relay_pin}
      inverted: true
    id: chime_relay_physical
    internal: true
    restore_mode: ALWAYS_OFF

  - platform: template
    name: "Chime Relay"
    icon: "mdi:bell-ring"
    lambda: "return id(ring_chime).is_running();"
    turn_on_action:
      - script.execute: ring_chime
    turn_off_action:
      - script.stop: ring_chime
      - switch.turn_off: chime_relay_physical

  - platform: template
    name: "Silent Mode"
    icon: "mdi:bell-off"
    lambda: |-
      return id(silent_mode_enabled);
    turn_on_action:
      - globals.set:
          id: silent_mode_enabled
          value: "true"
    turn_off_action:
      - globals.set:
          id: silent_mode_enabled
          value: "false"
